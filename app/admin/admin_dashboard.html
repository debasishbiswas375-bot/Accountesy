{% extends "base.html" %}
{% block content %}
<div class="glass-panel" style="padding: 40px; border-radius: 30px;">
    <div style="display: flex; justify-content: space-between; margin-bottom: 40px;">
        <h1 style="margin: 0;">User Management</h1>
        <span style="background: #10b981; color: white; padding: 5px 15px; border-radius: 20px; font-size: 0.8rem;">Supabase Live</span>
    </div>
    <table style="width: 100%; border-collapse: collapse;">
        <thead>
            <tr style="text-align: left; border-bottom: 2px solid #e2e8f0;">
                <th style="padding: 15px;">User</th><th style="padding: 15px;">Email</th><th style="padding: 15px;">Plan</th><th style="padding: 15px;">Action</th>
            </tr>
        </thead>
        <tbody>
            {% for user in users %}
            <tr style="border-bottom: 1px solid #f1f5f9;">
                <td style="padding: 15px; font-weight: 700;">{{ user.name }}</td>
                <td style="padding: 15px;">{{ user.email }}</td>
                <td style="padding: 15px;"><span style="color: var(--primary-blue); font-weight: 800;">{{ user.plan }}</span></td>
                <td style="padding: 15px;">
                    <form action="/admin/update-user" method="POST" style="display: flex; gap: 10px;">
                        <input type="hidden" name="user_id" value="{{ user.id }}">
                        <select name="new_plan" style="padding: 5px; border-radius: 8px;">
                            <option value="FREE">FREE</option>
                            <option value="PRO">PRO</option>
                            <option value="ENTERPRISE">ENTERPRISE</option>
                        </select>
                        <button type="submit" style="background: #1e293b; color: white; border: none; padding: 5px 15px; border-radius: 8px; cursor: pointer;">Update</button>
                    </form>
                </td>
            </tr>
            {% endfor %}
        </tbody>
    </table>
</div>
{% endblock %}
