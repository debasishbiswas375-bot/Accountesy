{% extends "base.html" %}

{% block content %}

<h1>Plans</h1>

<div class="plans">

{% for p in plans %}

<div class="plan-card">

<h2>{{p.name}}</h2>

<p>{{p.credits}} Credits</p>

<p>{{p.duration}} Days</p>

<h3>₹{{p.price}}</h3>

<button>Buy Plan</button>

</div>

{% endfor %}

</div>

{% endblock %}
