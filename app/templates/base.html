<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Accountesy | Dashboard</title>
    <link rel="stylesheet" href="{{ url_for('static', path='css/main.css') }}">
</head>
<body>

    <header class="topbar glass-panel">
        <div style="display: flex; align-items: center; gap: 15px;">
            <img src="{{ url_for('static', path='assets/logo.png') }}" style="width: 32px;">
            <div style="display: flex; flex-direction: column;">
                <h2 style="margin: 0; font-size: 1.1rem; color: #1e40af;">Accountesy</h2>
                <small style="font-size: 0.65rem; opacity: 0.6;">Welcome to Accounting Expert Enterprise UI</small>
            </div>
        </div>
        <div style="display: flex; align-items: center; gap: 20px;">
            <div style="background: var(--primary-blue, #4A90E2); color: white; padding: 4px 12px; border-radius: 20px; font-size: 0.75rem;">Free Plan</div>
            <div style="background: var(--primary-blue, #4A90E2); color: white; width: 32px; height: 32px; border-radius: 50%; display: grid; place-items: center; font-weight: bold;">D</div>
        </div>
    </header>

    <div style="display: flex; flex: 1; overflow: hidden;">
        <nav class="sidebar glass-panel">
            <div class="nav-links">
                <a href="/" class="nav-item">
                    <svg xmlns="http://www.w3.org/2000/svg" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="nav-icon"><rect width="7" height="9" x="3" y="3" rx="1"></rect><rect width="7" height="5" x="14" y="3" rx="1"></rect><rect width="7" height="9" x="14" y="12" rx="1"></rect><rect width="7" height="5" x="3" y="16" rx="1"></rect></svg>
                    Dashboard
                </a>
                
                <a href="/admin" class="nav-item">
                    <svg xmlns="http://www.w3.org/2000/svg" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="nav-icon"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"></path></svg>
                    Admin
                </a>
                
                <a href="/billing" class="nav-item">
                    <svg xmlns="http://www.w3.org/2000/svg" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="nav-icon"><rect x="1" y="4" width="22" height="16" rx="2" ry="2"></rect><line x1="1" y1="10" x2="23" y2="10"></line></svg>
                    Billing
                </a>
                
                <a href="/settings" class="nav-item">
                    <svg xmlns="http://www.w3.org/2000/svg" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="nav-icon"><circle cx="12" cy="12" r="3"></circle><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"></path></svg>
                    Settings
                </a>
            </div>

            <div style="margin-top: auto; text-align: center; padding-top: 20px;">
                <p style="font-size: 0.7rem; opacity: 0.6; margin: 0;">Sponsored by</p>
                <img src="{{ url_for('static', path='assets/logo1.png') }}" style="width: 55px; margin: 8px 0;">
                <p style="font-weight: bold; font-size: 0.8rem; margin: 0;">Uday Mondal | Tax Consultant</p>
            </div>
        </nav>

        <main style="flex: 1; padding: 40px; overflow-y: auto;">
            {% block content %}
            <h1 style="font-size: 3rem; font-weight: 800; color: #1e293b;">Dashboard</h1>
            {% endblock %}
        </main>
    </div>

</body>
</html>
