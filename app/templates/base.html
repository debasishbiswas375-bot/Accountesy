<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Accountesy Pro</title>
    <link rel="stylesheet" href="/static/css/main.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
</head>
<body>
    <div class="app-wrapper">
        <header>
            <div style="display: flex; align-items: center;">
                <img src="/static/assets/logo.png" style="height: 38px; margin-right: 12px;">
                <h1 style="margin: 0; font-size: 1.1rem; font-weight: 800; color: var(--navy);">Accountesy</h1>
                <span style="margin-left: 10px; background: var(--primary-blue); color: white; padding: 2px 10px; border-radius: 20px; font-size: 0.65rem; font-weight: 800;">PRO</span>
            </div>

            <div class="header-actions">
                <div class="icon-button" onclick="toggleNotif()">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#64748b" stroke-width="2"><path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"></path><path d="M13.73 21a2 2 0 0 1-3.46 0"></path></svg>
                </div>
                <div class="avatar-bubble" id="userAvatar">D</div>
            </div>
        </header>

        <div class="main-layout">
            <nav class="sidebar">
                <div style="padding: 20px 0; flex: 1;">
                    <a href="/dashboard" class="nav-item active">
                        <svg class="liquid-icon" viewBox="0 0 24 24"><path d="M3 13h8V3H3v10zm0 8h8v-6H3v6zm10 0h8V11h-8v10zm0-18v6h8V3h-8z"/></svg>
                        <span class="nav-text">Dashboard</span>
                    </a>
                    <a href="/workspace" class="nav-item">
                        <svg class="liquid-icon" viewBox="0 0 24 24"><path d="M12 2L4.5 20.29l.71.71L12 18l6.79 3 .71-.71z"/></svg>
                        <span class="nav-text">Workspace</span>
                    </a>
                    <a href="/history" class="nav-item">
                        <svg class="liquid-icon" viewBox="0 0 24 24"><path d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z" stroke="#64748b" stroke-width="2" fill="none"/></svg>
                        <span class="nav-text">History</span>
                    </a>
                </div>
                
                <div style="padding: 20px; text-align: center; margin-top: auto;">
                    <img src="/static/assets/logo1.png" style="width: 45px; opacity: 0.8;">
                    <p class="nav-text" style="font-size: 0.65rem; color: #94a3b8; margin-top: 5px;">Powered by Uday Mondal</p>
                </div>
            </nav>

            <main style="flex: 1; overflow-y: auto; padding: 30px;">
                {% block content %}{% endblock %}
            </main>
        </div>

        <footer style="height: 40px; display: flex; align-items: center; justify-content: center; background: rgba(255,255,255,0.1); border-top: 1px solid rgba(255,255,255,0.2);">
            <p style="font-size: 0.75rem; color: #64748b; margin: 0;">Created by <b>Debasish Biswas</b> | © 2026 All Rights Reserved</p>
        </footer>
    </div>
</body>
</html>
