{% extends "base.html" %}
{% block content %}
<div class="workspace-card">
    <h2>Tally Conversion Workspace</h2>

    <div id="drop-area" style="border: 2px dashed rgba(255,255,255,0.2); border-radius: 20px; padding: 40px; text-align: center; background: rgba(255,255,255,0.05);">
        <i data-lucide="upload-cloud" style="width: 48px; height: 48px; margin-bottom: 15px;"></i>
        <p>Drag and drop <b>Bank Statement</b> and <b>Master.html</b> here</p>
        <input type="file" id="file-input" multiple hidden>
        <button onclick="document.getElementById('file-input').click()" class="btn-select">Or Select Files</button>
        <div id="file-list" style="margin-top: 15px; font-size: 13px; color: #60a5fa;"></div>
    </div>

    <button id="preview-btn" class="btn-primary" style="margin-top: 20px; width: 100%;">AI Preview & Classify</button>

    <div id="preview-container" style="display:none; margin-top: 40px;">
        <h3>AI Classification Results</h3>
        <table class="preview-table">
            <thead>
                <tr>
                    <th>Date</th>
                    <th>Narration</th>
                    <th>Ledger (Select if AI is unsure)</th>
                    <th>Amount</th>
                </tr>
            </thead>
            <tbody id="preview-body"></tbody>
        </table>
        <button onclick="generateFinalXML()" class="btn-download">Download Final Tally XML</button>
    </div>
</div>

<script>
let dropArea = document.getElementById('drop-area');
let bankFile, masterFile;

// STOP BROWSER DEFAULTS
['dragenter', 'dragover', 'dragleave', 'drop'].forEach(e => {
    dropArea.addEventListener(e, (evt) => { evt.preventDefault(); evt.stopPropagation(); }, false);
});

dropArea.addEventListener('drop', (e) => {
    let files = e.dataTransfer.files;
    handleFiles(files);
});

function handleFiles(files) {
    for (let f of files) {
        if (f.name.toLowerCase().endsWith('.pdf') || f.name.toLowerCase().endsWith('.xlsx')) bankFile = f;
        if (f.name.toLowerCase().endsWith('.html')) masterFile = f;
    }
    document.getElementById('file-list').innerText = `Ready: ${bankFile?.name} & ${masterFile?.name}`;
}

document.getElementById('preview-btn').onclick = async () => {
    if (!bankFile || !masterFile) return alert("Please drop both files first!");
    
    let formData = new FormData();
    formData.append('bank_file', bankFile);
    formData.append('master_file', masterFile);

    let response = await fetch('/convert/preview', { method: 'POST', body: formData });
    let data = await response.json();

    let html = '';
    data.transactions.forEach((tx, idx) => {
        let options = tx.options.map(o => `<option value="${o}" ${o === tx.ledger ? 'selected' : ''}>${o}</option>`).join('');
        html += `
            <tr style="${tx.doubt ? 'background: rgba(239, 68, 68, 0.1);' : ''}">
                <td>${tx.date}</td>
                <td style="font-size: 11px;">${tx.narration.substring(0, 50)}...</td>
                <td><select class="ai-ledger-select" data-idx="${idx}">${options}</select></td>
                <td style="text-align: right;">${tx.amount}</td>
            </tr>`;
    });
    document.getElementById('preview-body').innerHTML = html;
    document.getElementById('preview-container').style.display = 'block';
};
</script>
{% endblock %}
