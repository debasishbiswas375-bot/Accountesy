{% extends "base.html" %}

{% block content %}

<h1>Admin Panel</h1>

<table>

<tr>
<th>Email</th>
<th>Plan</th>
<th>Credits</th>
</tr>

{% for user in users %}

<tr>

<td>{{ user.email }}</td>
<td>{{ user.plan }}</td>
<td>{{ user.credits }}</td>

</tr>

{% endfor %}

</table>

{% endblock %}
