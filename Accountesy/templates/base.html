<!DOCTYPE html>
<html lang="en">
<head>
    <title>Accountesy</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/png" href="/static/logo.png">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/static/style.css">
    <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body>

<div class="topbar">
    <div class="top-left" style="display: flex; align-items: center;">
        <img src="/static/logo.png" style="height: 40px; margin-right: 15px;">
        <div class="brand-text">
            <div class="brand-name" style="font-weight: 700; font-size: 20px;">Accountesy</div>
        </div>
    </div>

    <div class="top-right">
        <div class="notification-container" style="position: relative;">
            <i data-lucide="bell"></i>
            <span class="notif-dot"></span>
        </div>
        <div class="avatar-container">
            <div class="avatar">D</div> </div>
        <a href="/auth/register" style="background: var(--accent); color: white; padding: 8px 20px; border-radius: 8px; text-decoration: none; font-weight: 600;">Register</a>
    </div>
</div>

<div class="sidebar">
    <nav class="nav-section">
        <a href="/" class="nav-item" style="display:block; color:white; text-decoration:none; margin-bottom:20px;"><i data-lucide="layout-dashboard"></i> Dashboard</a>
        <a href="/admin" class="nav-item" style="display:block; color:white; text-decoration:none; margin-bottom:20px;"><i data-lucide="shield"></i> Admin</a>
    </nav>
    
    <div class="sponsor-box" style="position: absolute; bottom: 100px; text-align: center; width: 220px;">
        <p style="font-size: 10px; opacity:0.7;">Sponsored by</p>
        <img src="/static/logo1.png" style="width: 100%; border-radius: 8px;">
        <p style="font-size: 11px;">Uday Mondal | Tax Consultant</p>
    </div>
</div>

<div class="main">
    {% block content %}{% endblock %}
</div>

<footer class="footer">
    <p>© 2026 Accountesy | Created by <strong>Debasish Biswas</strong></p>
</footer>

<script>lucide.createIcons();</script>
</body>
</html>
