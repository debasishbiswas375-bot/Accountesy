<!DOCTYPE html>
<html lang="en">
<head>
    <title>Accountesy - Accounting Expert</title>
    <link rel="icon" type="image/png" href="/static/logo.png">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        :root { --sidebar-width: 260px; --topbar-height: 70px; }
        body {
            margin: 0; padding: 0; font-family: 'Poppins', sans-serif;
            background: url('/static/b-logo.png') no-repeat center center fixed;
            background-size: cover; color: white; overflow-x: hidden;
        }
        .topbar {
            height: var(--topbar-height);
            background: rgba(0, 0, 0, 0.4); backdrop-filter: blur(15px);
            display: flex; justify-content: space-between; align-items: center;
            padding: 0 50px; /* 50px lined alignment */
            border-bottom: 1px solid rgba(255,255,255,0.1);
        }
        .sidebar {
            width: var(--sidebar-width); height: calc(100vh - var(--topbar-height));
            background: rgba(255, 255, 255, 0.05); backdrop-filter: blur(20px);
            position: fixed; top: var(--topbar-height); left: 0;
            padding: 30px 20px; border-right: 1px solid rgba(255,255,255,0.1);
        }
        .main-content {
            margin-left: var(--sidebar-width);
            padding: 50px; /* 50px lined alignment */
            min-height: calc(100vh - var(--topbar-height) - 100px);
        }
        .sponsor-box {
            background: rgba(255, 255, 255, 0.1); padding: 15px; border-radius: 12px;
            text-align: center; margin-top: 50px;
        }
        footer {
            margin-left: var(--sidebar-width); padding: 30px 50px;
            text-align: center; border-top: 1px solid rgba(255,255,255,0.1);
            background: rgba(0,0,0,0.3); backdrop-filter: blur(5px);
        }
    </style>
</head>
<body>
    <div class="topbar">
        <div style="display: flex; align-items: center;">
            <img src="/static/logo.png" style="height: 45px; margin-right: 15px;">
            <span style="font-weight: 700; font-size: 22px;">Accountesy</span>
        </div>
        <div>
            <a href="/auth/login" style="color: white; text-decoration: none; margin-right: 25px;">Login</a>
            <a href="/auth/register" style="background: #3b82f6; padding: 10px 25px; border-radius: 8px; text-decoration: none; color: white; font-weight: 600;">Register</a>
        </div>
    </div>

    <div class="sidebar">
        <nav>
            <a href="/" style="display: flex; color: white; text-decoration: none; margin-bottom: 20px;"><i data-lucide="home"></i>&nbsp; Home</a>
            <a href="/dashboard" style="display: flex; color: white; text-decoration: none;"><i data-lucide="layout-dashboard"></i>&nbsp; Dashboard</a>
        </nav>
        <div class="sponsor-box">
            <p style="font-size: 10px; margin-bottom: 5px;">Sponsored by</p>
            <img src="/static/logo1.png" style="width: 100%; border-radius: 5px;">
            <p style="font-size: 12px; font-weight: 600; margin-top: 5px;">Uday Mondal | Tax Consultant</p>
        </div>
    </div>

    <div class="main-content">
        {% block content %}{% endblock %}
    </div>

    <footer>
        <p>© 2026 Accountesy | Created by <strong>Debasish Biswas</strong></p>
    </footer>

    <script>lucide.createIcons();</script>
</body>
</html>
