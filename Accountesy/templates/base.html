<!DOCTYPE html>
<html lang="en">
<head>
    <link rel="stylesheet" href="/static/style.css">
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        body {
            background: url('/static/b-logo.png') no-repeat center center fixed; /* Your background */
            background-size: cover;
            display: flex;
        }
    </style>
</head>
<body>
    <nav class="sidebar">
        <div class="logo-area">
            <img src="/static/logo.png" alt="Logo" style="height: 35px;"> <span class="logo-text">Accountesy</span>
        </div>
        <div class="nav-links">
            <a href="/dashboard" class="nav-item"><i data-lucide="layout-dashboard"></i> Dashboard</a>
            <a href="/workspace" class="nav-item"><i data-lucide="plus-square"></i> Workspace</a>
            <a href="/history" class="nav-item"><i data-lucide="history"></i> History</a>
            <a href="/pricing" class="nav-item"><i data-lucide="credit-card"></i> Pricing</a>
            {% if user_name == 'deba1234' %}
                <a href="/admin" class="nav-item"><i data-lucide="shield-check"></i> Admin Panel</a>
            {% endif %}
        </div>
        <div class="user-footer">
            <img src="/static/logo1.png" alt="Sponsor" style="width: 30px; border-radius: 50%;"> <p>{{ user_name if user_name else 'Guest' }}</p>
        </div>
    </nav>

    <main class="main-content" style="flex: 1; margin-left: 260px; padding: 40px;">
        <header style="display: flex; justify-content: flex-end; align-items: center; gap: 20px; margin-bottom: 30px;">
            <i data-lucide="bell" style="color: white;"></i>
            <div style="display: flex; align-items: center; gap: 10px; background: rgba(255,255,255,0.1); padding: 5px 15px; border-radius: 20px;">
                <span style="color: white; font-weight: bold;">{{ user_name }}</span>
                <div style="width: 32px; height: 32px; background: white; border-radius: 50%; display: flex; align-items: center; justify-content: center; color: #2a67b1;">
                    {{ user_name[0] if user_name else '?' }}
                </div>
            </div>
        </header>
        {% block content %}{% endblock %}
    </main>
    <script>lucide.createIcons();</script>
</body>
</html>
