<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Accountesy AI | Tally Automation</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    
    <style>
        :root {
            --primary-blue: #2a67b1;
            --secondary-blue: #1e40af;
            --bg-light: #f4f7fa;
            --glass: rgba(255, 255, 255, 0.85);
            --sidebar-width: 260px;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-light);
            margin: 0;
            display: flex;
            min-height: 100vh;
            color: #1e293b;
        }

        /* --- SIDEBAR NAVIGATION --- */
        .sidebar {
            width: var(--sidebar-width);
            background: #ffffff;
            border-right: 1px solid #e2e8f0;
            display: flex;
            flex-direction: column;
            padding: 20px;
            position: fixed;
            height: 100vh;
            box-sizing: border-box;
        }

        .logo-area {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 10px;
            margin-bottom: 30px;
        }

        .logo-text {
            font-weight: 800;
            font-size: 1.4rem;
            color: var(--primary-blue);
            letter-spacing: -1px;
        }

        .nav-links {
            display: flex;
            flex-direction: column;
            gap: 8px;
            flex-grow: 1;
        }

        .nav-item {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 12px 15px;
            text-decoration: none;
            color: #64748b;
            font-weight: 500;
            border-radius: 10px;
            transition: 0.2s;
        }

        .nav-item:hover {
            background: #f1f5f9;
            color: var(--primary-blue);
        }

        .nav-item.active {
            background: rgba(42, 103, 177, 0.1);
            color: var(--primary-blue);
        }

        /* --- MAIN CONTENT AREA --- */
        .main-content {
            margin-left: var(--sidebar-width);
            flex-grow: 1;
            padding: 40px;
            max-width: 1200px;
        }

        /* --- GLOBAL GLASS COMPONENTS --- */
        .glass-card {
            background: var(--glass);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.3);
            border-radius: 20px;
            padding: 30px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.03);
        }

        .preview-table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 20px;
        }

        .preview-table th {
            text-align: left;
            padding: 15px;
            background: #f8fafc;
            font-size: 12px;
            text-transform: uppercase;
            color: #64748b;
        }

        .preview-table td {
            padding: 15px;
            border-bottom: 1px solid #f1f5f9;
        }

        .footer-btn {
            background: var(--primary-blue);
            color: white;
            padding: 12px 25px;
            border-radius: 8px;
            border: none;
            cursor: pointer;
            font-weight: 600;
            transition: 0.3s;
        }

        .footer-btn:hover {
            background: var(--secondary-blue);
            transform: translateY(-2px);
        }
    </style>
</head>
<body>

    <nav class="sidebar">
        <div class="logo-area">
            <div style="background: var(--primary-blue); width: 35px; height: 35px; border-radius: 8px; display: flex; align-items: center; justify-content: center;">
                <i data-lucide="zap" style="color: white; width: 20px;"></i>
            </div>
            <span class="logo-text">Accountesy</span>
        </div>

        <div class="nav-links">
            <a href="/dashboard" class="nav-item">
                <i data-lucide="layout-dashboard" style="width: 20px;"></i> Dashboard
            </a>
            <a href="/workspace" class="nav-item">
                <i data-lucide="plus-square" style="width: 20px;"></i> Workspace
            </a>
            <a href="/history" class="nav-item">
                <i data-lucide="history" style="width: 20px;"></i> History
            </a>
            <a href="/pricing" class="nav-item">
                <i data-lucide="credit-card" style="width: 20px;"></i> Pricing
            </a>
            <a href="/account" class="nav-item">
                <i data-lucide="settings" style="width: 20px;"></i> Account
            </a>
            
            <div style="margin-top: 20px; padding: 10px; border-top: 1px solid #f1f5f9;">
                <p style="font-size: 10px; color: #94a3b8; font-weight: bold; text-transform: uppercase;">Admin Only</p>
                <a href="/admin" class="nav-item">
                    <i data-lucide="shield-check" style="width: 20px;"></i> Admin Panel
                </a>
            </div>
        </div>

       <div class="user-footer" style="padding: 15px; border-top: 1px solid #f1f5f9;">
    <p style="margin: 0; font-size: 13px; font-weight: 600;">
        {{ user_name if user_name else 'Guest User' }}
    </p>
    <p style="margin: 0; font-size: 11px; color: #94a3b8;">
        Credits: {{ credits if credits else '0.00' }}
    </p>
</div>
    </nav>

    <main class="main-content">
        {% block content %}{% endblock %}
    </main>

    <script>
        // Initialize Lucide Icons globally
        lucide.createIcons();
        
        // Highlight active link
        document.querySelectorAll('.nav-item').forEach(link => {
            if(link.getAttribute('href') === window.location.pathname) {
                link.classList.add('active');
            }
        });
    </script>
</body>
</html>
