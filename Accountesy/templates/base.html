<!DOCTYPE html>
<html>
<head>
    <title>Accountesy</title>
    <link rel="stylesheet" href="/static/style.css">
    <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body>
    <div class="topbar">
        <div class="brand-section">
            <i data-lucide="menu" id="sidebar-toggle"></i>
            <img src="/static/logo.png" style="height:60px;">
            <div class="brand-text">
                <div class="name">Accountesy</div>
                <div class="tagline">Learn Smart, Grow Fast, Be Accounting Expert with Accountesy</div>
            </div>
        </div>
        <div class="topbar-actions">
            <i data-lucide="bell" id="bell-icon"></i>
            <div class="avatar" id="avatar-icon">D</div>
            <div class="dropdown" id="avatar-dropdown">
                <a href="/account">Account Settings</a>
                <a href="/logout">Logout</a>
            </div>
        </div>
    </div>

    <div class="main-layout">
        <div class="sidebar" id="sidebar">
            <a href="/" class="nav-item"><i data-lucide="layout-dashboard"></i><span>Dashboard</span></a>
            <a href="/workspace" class="nav-item"><i data-lucide="briefcase"></i><span>Workspace</span></a>
            <a href="/features" class="nav-item"><i data-lucide="star"></i><span>Features</span></a>
            <a href="/pricing" class="nav-item"><i data-lucide="credit-card"></i><span>Pricing</span></a>
            <a href="/history" class="nav-item"><i data-lucide="history"></i><span>History</span></a>
        </div>
        <div class="content-area">
            {% block content %}{% endblock %}
        </div>
    </div>

    <footer class="main-footer">
        <div>© 2026 Accountesy | Created by <strong>Debasish Biswas</strong></div>
    </footer>

    <script>
        // Dropdown & Sidebar Logic
        document.getElementById('avatar-icon').onclick = (e) => {
            e.stopPropagation();
            document.getElementById('avatar-dropdown').classList.toggle('show');
        };
        document.getElementById('sidebar-toggle').onclick = () => {
            document.getElementById('sidebar').classList.toggle('mini');
        };
        window.onclick = () => document.querySelectorAll('.dropdown').forEach(d => d.classList.remove('show'));
        lucide.createIcons();
    </script>
</body>
</html>
