<!DOCTYPE html>
<html>
<head>
    <link rel="stylesheet" href="/static/style.css">
    <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body>
    <div class="sidebar">
        <img src="/static/logo.png" style="width: 150px;">
        <nav style="display: flex; flex-direction: column; gap: 15px; margin-top: 30px;">
            <a href="/" style="color: white; text-decoration: none;"><i data-lucide="home"></i> Home</a>
            <a href="/workspace" style="color: white; text-decoration: none;"><i data-lucide="layout"></i> Workspace</a>
            <a href="/pricing" style="color: white; text-decoration: none;"><i data-lucide="tag"></i> Pricing</a>
        </nav>
    </div>

    <div class="main-wrapper">
        {% block content %}{% endblock %}

        <footer class="global-footer">
            <h2>Need Expert Help?</h2>
            <form class="footer-form">
                <input type="email" placeholder="Your email" class="footer-input">
                <button type="submit" style="padding: 12px; background: white; border-radius: 8px; border: none; cursor: pointer;">Contact Me</button>
            </form>
        </footer>
    </div>
    <script>lucide.createIcons();</script>
</body>
</html>
