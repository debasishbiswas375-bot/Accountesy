{% extends "base.html" %}

{% block content %}

<h1>Conversion History</h1>

<table>

<tr>
<th>Date</th>
<th>File</th>
<th>Status</th>
</tr>

{% for item in history %}

<tr>
<td>{{ item.created_at }}</td>
<td>{{ item.file_name }}</td>
<td>Completed</td>
</tr>

{% endfor %}

</table>

{% endblock %}
